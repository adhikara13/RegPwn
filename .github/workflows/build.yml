name: Build RegPwn

on:
push:
workflow_dispatch:

jobs:
build:
runs-on: windows-2022

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup NuGet
    uses: NuGet/setup-nuget@v2

  - name: Restore NuGet packages
    run: nuget restore RegPwn.sln

  - name: Setup MSBuild
    uses: microsoft/setup-msbuild@v2

  - name: Build solution
    run: msbuild RegPwn.sln /p:Configuration=Release

  - name: Upload artifact
    uses: actions/upload-artifact@v4
    with:
      name: RegPwn
      path: |
        RegPwn/bin/Release/*.exe